name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Firebase config
        run: |
          sed -i "s|YOUR_API_KEY|$FIREBASE_API_KEY|g"                       src/environments/environment.ts src/environments/environment.prod.ts
          sed -i "s|YOUR_PROJECT.firebaseapp.com|$FIREBASE_AUTH_DOMAIN|g"   src/environments/environment.ts src/environments/environment.prod.ts
          sed -i "s|https://YOUR_PROJECT.firebaseio.com|$FIREBASE_DATABASE_URL|g" src/environments/environment.ts src/environments/environment.prod.ts
          sed -i "s|YOUR_PROJECT_ID|$FIREBASE_PROJECT_ID|g"                 src/environments/environment.ts src/environments/environment.prod.ts
          sed -i "s|YOUR_PROJECT.appspot.com|$FIREBASE_STORAGE_BUCKET|g"    src/environments/environment.ts src/environments/environment.prod.ts
          sed -i "s|YOUR_SENDER_ID|$FIREBASE_MESSAGING_SENDER_ID|g"         src/environments/environment.ts src/environments/environment.prod.ts
          sed -i "s|YOUR_APP_ID|$FIREBASE_APP_ID|g"                         src/environments/environment.ts src/environments/environment.prod.ts
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx ng test --browsers=ChromeHeadlessCI --watch=false

      - name: Build
        run: npm run build
